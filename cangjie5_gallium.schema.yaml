# Rime schema settings
# encoding: utf-8

schema:
  schema_id: cangjie5_gallium
  name: 倉頡五代·Gallium
  version: "1.0"
  author:
    - 發明人 朱邦復先生
  description: |
    第五代倉頡輸入法（Gallium v1＋符號修改 鍵盤佈局版）
    碼表源自倉頡之友發佈的《五倉世紀版》
    www.chinesecj.com
    碼元由 scripts/transform_gallium.py 自 QWERTY 版自動轉換而來，
    令倉頡字根停留在原本的實體鍵位上。
  dependencies:
    - luna_quanpin

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
    abbrev: [ 中, Ａ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]
  - name: extended_charset
    states: [ 常用, 增廣 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - simplifier
    - uniquifier
    - single_char_filter

speller:
  alphabet: ";abcdefghijklmnopqrstuvwxyz"  # 全 26 字母（i 保留供拼音反查）＋ ;（碼元）
  delimiter: " "                            # 原 " ;" 之 ; 已成碼元，僅留空格
  #max_code_length: 5  # 五碼頂字上屏

translator:
  dictionary: cangjie5_gallium
  prism: cangjie5_gallium
  enable_charset_filter: true
  enable_sentence: true
  enable_encoder: true
  encode_commit_history: true
  max_phrase_length: 5
  preedit_format:
    - 'xform/^([a-z;]*)$/$1\t（\U$1\E）/'
    - "xlit|;ABCDEFGHJKLMNOPQRSTUVWXYZ|心大手口水中一土十卜弓田金日戈竹難尸火木人廿女符山月|"
  comment_format:
    - "xlit|;abcdefghjklmnopqrstuvwxyz~|心大手口水中一土十卜弓田金日戈竹難尸火木人廿女符山月～|"
  disable_user_dict_for_patterns:
    - "^x.*$"     # 月（QWERTY z -> Gallium x）
    - "^jjj.*$"   # 卜卜卜（QWERTY y -> Gallium j）

abc_segmentor:
  extra_tags:
    - reverse_lookup  # 與拼音（反查碼）混打

reverse_lookup:
  dictionary: luna_pinyin
  prism: luna_quanpin
  prefix: "`"
  suffix: "'"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  comment_format:
    - "xlit|;abcdefghjklmnopqrstuvwxyz|心大手口水中一土十卜弓田金日戈竹難尸火木人廿女符山月|"

simplifier:
  tips: all  # 簡化字模式下提示對應的傳統漢字

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: '^/([0-9]0?|[A-Za-z]+)$'
    reverse_lookup: "`[a-z]*'?$|[a-z]+'$"
